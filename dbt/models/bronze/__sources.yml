
version: 2

sources:
  - name: danish_parliament
    schema: danish_parliament
    description: Data from the danish parliament
    loaded_at_field: LKHS_date_inserted
    freshness:
      warn_after: {count: "{{ env_var('DBT_FRESHNESS_WARN_AFTER_DAYS', '2') | int }}", period: day}
      error_after: {count: "{{ env_var('DBT_FRESHNESS_ERROR_AFTER_DAYS', '7') | int }}", period: day}

    tables:
    - name: bronze_afstemning
      description: One record per party vote in the danish parliament
      meta:
        external_location: "read_json_auto('{{ env_var('DANISH_DEMOCRACY_DATA_SOURCE', 'abfss://onelake.dfs.fabric.microsoft.com/<YOUR_WORKSPACE>/<YOUR_LAKEHOUSE>.Lakehouse/Files/Bronze/DDD') }}/afstemning/afstemning_*.json*', filename=True, union_by_name = true)"
