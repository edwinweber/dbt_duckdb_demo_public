version: 2

# ---------------------------------------------------------------------------
# Incremental / CDC tables
# These are the six entities that change over time and are extracted
# incrementally from the OData API. Each has a full SCD Type 2 history with
# hash-based CDC (I / U / D) and a companion _cv (current-version) view.
# ---------------------------------------------------------------------------

models:
  - name: silver_afstemning
    description: SCD Type 2 history for Afstemning (vote sessions).
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          config:
            enabled: false
          arguments:
            min_value: 1
    columns:
      - name: id
        data_tests:
          - not_null
      - name: LKHS_date_valid_from
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: "'2000-01-01'"
                strictly: false
      - name: LKHS_cdc_operation
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['I', 'U', 'D']
      - name: LKHS_hash_value
        data_tests:
          - not_null
          - dbt_expectations.expect_column_value_lengths_to_equal:
              arguments:
                value: 64
      - name: LKHS_source_system_code
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['DDD']

  - name: silver_aktoer
    description: SCD Type 2 history for Aktør (actors/members).
