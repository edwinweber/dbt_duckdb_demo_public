  # ---------------------------------------------------------------------------
  # Current-version (_cv) views
  # Each view returns exactly one row per entity key — the most recent version
  # from the SCD Type 2 history table, determined by MAX(LKHS_date_valid_from).
  # Rows with LKHS_cdc_operation = 'D' may appear when an entity has been
  # deleted at source; downstream consumers should filter these out if needed.
  # ---------------------------------------------------------------------------

  - name: silver_afstemning_cv
    description: >
      Current-version view of Afstemning (vote sessions). One row per vote
      session — the latest CDC version. Filter WHERE LKHS_cdc_operation != 'D'
      to exclude source-deleted records.
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          config:
            enabled: false
          arguments:
            min_value: 1
    columns:
      - name: id
        data_tests:
          - not_null
          - unique
      - name: LKHS_cdc_operation
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['I', 'U', 'D']
      - name: LKHS_hash_value
        data_tests:
          - not_null
          - dbt_expectations.expect_column_value_lengths_to_equal:
              arguments:
                value: 64

  - name: silver_aktoer_cv
