danish_democracy_data:
  # STORAGE_TARGET controls which output is used:
  #   local   — reads JSON from local filesystem, no Azure credentials needed
  #   onelake — reads JSON from Fabric OneLake via abfss://, requires Azure service principal
  target: "{{ env_var('STORAGE_TARGET', 'local') }}"
  outputs:
    local:
      type: duckdb
      path: "{{ env_var('DUCKDB_DATABASE_LOCATION') }}"
      extensions:
        - httpfs
        - parquet
        - delta
      external_root: 'data/curated'

    onelake:
      type: duckdb
      path: "{{ env_var('DUCKDB_DATABASE_LOCATION') }}"
      extensions:
        - httpfs
        - parquet
        - azure
        - delta
      settings:
        azure_transport_option_type: 'curl'
      secrets:
        - type: azure
          provider: service_principal
          name: azure_sp
          persistent: true
          tenant_id: "{{ env_var('AZURE_TENANT_ID') }}"
          client_id: "{{ env_var('AZURE_CLIENT_ID') }}"
          client_secret: "{{ env_var('AZURE_CLIENT_SECRET') }}"
          account_name: 'onelake'
      external_root: 'data/curated'
